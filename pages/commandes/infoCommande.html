<section class="container py-5">

    <!-- TITRE -->
    <h2 class="mb-4">Etapes 1 : Informations pour la commande</h2>

    <!-- INFOS -->
    <p class="mb-1">
        Merci de remplir les champs suivant
    </p>
    <p class="text-danger small mb-4">
        <strong>Attention :</strong> Si livraison en dehors de Bordeaux, facturation de 5 euros
        (majoré de 59 centimes par km parcouru)
    </p>

    <!-- FORMULAIRE -->
    <form id="formInfoCommande" action="/choixCommande" method="GET">

        <div class="row g-4">

        <!-- NOM COMPLET -->
        <div class="col-12">
            <label class="form-label">Nom Complet</label>
            <input type="text" class="form-control" id="nomComplet">
        </div>

        <!-- TELEPHONE -->
        <div class="col-md-6">
            <label class="form-label">Numéro de téléphone</label>
            <input type="tel" class="form-control" id="telephone">
        </div>

        <!-- EMAIL -->
        <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email">
        </div>

        <!-- ADRESSE -->
        <div class="col-12">
            <label class="form-label">Adresse de la prestation</label>
            <div class="row g-2">

                <!-- NUMÉRO DE RUE -->
                <div class="col-md-2">
                    <input type="text" class="form-control" id="numeroRue" placeholder="N° de rue">
                </div>

                <!-- NOM DE LA RUE -->
                <div class="col-md-10">
                    <input type="text" class="form-control" id="nomRue" placeholder="Nom de la rue">
                </div>

                <!-- CODE POSTAL -->
                <div class="col-md-4">
                    <input type="text" class="form-control" id="codePostal" placeholder="Code postal">
                </div>

                <!-- VILLE -->
                <div class="col-md-8">
                    <input type="text" class="form-control" id="ville" placeholder="Ville">
                </div>

            </div>
        </div>


        <!-- DATE -->
        <div class="col-md-6">
            <label class="form-label">Date de la prestation</label>
            <input type="date" class="form-control" id="date">
        </div>

        <!-- HEURE -->
        <div class="col-md-6">
            <label class="form-label">Heure de la prestation</label>
            <input type="time" class="form-control" id="heure">
        </div>

        <!-- AUTRES INFOS -->
        <div class="col-12">
            <label class="form-label">Autres informations ou demandes</label>
            <textarea class="form-control" rows="4" id="autresInfos"></textarea>
        </div>

        </div>

        <!-- BOUTON -->
        <div class="text-center mt-5">
        <button type="submit" class="btn btn-primary px-5 py-3 fw-bold">
            Continuer
        </button>
        </div>

    </form>

</section>
