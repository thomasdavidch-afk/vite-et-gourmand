<section class="container py-5">

    <!-- TITRE -->
    <h2 class="mb-4">Etapes 2 : Le choix du Menu</h2>

    <!-- INFOS -->
    <p class="mb-1">
        Merci de remplir les champs suivant
    </p>

    <p class="text-danger small mb-4">
        <strong>Attention :</strong> Minimum de personnes par Menu, si plus de 5 personnes
        que le nombre minimum il y a une remise de 10%
    </p>

    <form action="/confirmationCommande" methode="GET">

        <div class="row g-4">

        <!-- SELECT MENU -->
        <div class="col-12">
            <label class="form-label">Choisissez votre Menu</label>
            <select class="form-select">
            <option selected disabled>-- Sélectionnez un menu --</option>
            <option>Menu Joyeux Noël Indien</option>
            <option>Menu Le Végé</option>
            <option>Menu Séminaire</option>
            <option>Menu Le Grand Format</option>
            <option>Menu Vive les Mariés</option>
            </select>
        </div>

        <!-- NOMBRE PERSONNES -->
        <div class="col-md-6">
            <label class="form-label">Nombre de personnes</label>
            <input type="number" class="form-control" min="30">
        </div>

        <!-- REMISE -->
        <div class="col-md-6">
            <label class="form-label">Remise</label>
            <input type="text" class="form-control bg-light" placeholder="Calcul automatique" disabled>
        </div>

        <!-- PRIX BASE -->
        <div class="col-md-4">
            <label class="form-label">Prix de Base</label>
            <input type="text" class="form-control bg-light" disabled>
        </div>

        <!-- MONTANT REMISE -->
        <div class="col-md-4">
            <label class="form-label">Montant de la remise</label>
            <input type="text" class="form-control bg-light" disabled>
        </div>

        <!-- PRIX TOTAL -->
        <div class="col-md-4">
            <label class="form-label">Prix Total</label>
            <input type="text" class="form-control bg-light fw-bold" disabled>
        </div>

        </div>

        <!-- BOUTON -->
        <div class="text-center mt-5">
        <button type="submit" class="btn btn-primary px-5 py-3 fw-bold fs-4 rounded">
            Je valide ma commande
        </button>
        </div>

    </form>

</section>
