<section class="hero-signin d-flex align-items-center justify-content-center text-center text-white">
    <div class="container">
        <h1 class="fw-bold">Connexion</h1>
    </div>
</section>

<div class="container py-5">
    <form>
        <div class="mb-3">
            <label for="EmailInput" class="form-label">Email</label>
            <input type="email" class="form-control" id="EmailInput" placeholder="test@mail.fr">
        </div>
        <div class="mb-3">
            <label for="PasswordInput" class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="PasswordInput">
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary">Se connecter</button>
        </div>

        <div class="text-center pt-3">
            <a href="/signup">Vous n'avez pas de compte ? Inscrivez-vous ici !</a>
        </div>
    </form>
</div>
