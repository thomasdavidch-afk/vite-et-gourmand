<section class="hero-signin d-flex align-items-center justify-content-center text-center text-white">
    <div class="container">
        <h1 class="fw-bold">Inscription</h1>
    </div>
</section>

<div class="container py-5">
    <form>
        <div class="mb-3">
            <label for="NameInput" class="form-label">Nom</label>
            <input type="text" class="form-control" id="NameInput" placeholder="Votre nom">
        </div>
        <div class="mb-3">
            <label for="SurnameInput" class="form-label">Prénom</label>
            <input type="text" class="form-control" id="SurnameInput" placeholder="Votre prénom">
        </div>
        <div class="mb-3">
            <label for="AdresseInput" class="form-label">Adresse</label>
            <input type="text" class="form-control" id="AdresseInput" placeholder="Votre adresse">
        </div>
        <div class="mb-3">
            <label for="VilleInput" class="form-label">Ville</label>
            <input type="text" class="form-control" id="VilleInput" placeholder="Votre ville">
        </div>
        <div class="mb-3">
            <label for="ZipInput" class="form-label">Code Postal</label>
            <input type="text" class="form-control" id="ZipInput">
        </div>
        <div class="mb-3">
            <label for="EmailInput" class="form-label">Email</label>
            <input type="email" class="form-control" id="EmailInput" placeholder="test@mail.fr">
        </div>
        <div class="mb-3">
            <label for="PhoneInput" class="form-label">Numéro de téléphone</label>
            <input type="tel" class="form-control" id="PhoneInput" placeholder="0600000000">
        </div>
        <div class="mb-3">
            <label for="PasswordInput" class="form-label">Mot de passe</label>
            <input type="password" class="form-control" id="PasswordInput">
        </div>
        <div class="mb-3">
            <label for="ValidatePasswordInput" class="form-label">Valider mon mot de passe</label>
            <input type="password" class="form-control" id="ValidatePasswordInput">
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-primary">S'inscire</button>
        </div>

        <div class="text-center pt-3">
            <a href="/signin">Vous avez déjà un compte ? Connectez-vous ici !</a>
        </div>
</form>
</div>
